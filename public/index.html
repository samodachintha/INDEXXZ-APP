<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IndexXZ — Buy & Sell Marketplace</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🛒</text></svg>" />

    <!-- ═══ EXTERNAL CSS ═══ -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
    <link rel="stylesheet" href="/css/styles.css" />

    <!-- ═══ INTERNAL CSS (critical above-the-fold overrides & extras) ═══ -->
    <style>
      /* Hero promo banner pulse */
      .top-banner { animation: bannerShimmer 3s infinite; }
      @keyframes bannerShimmer {
        0%, 100% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
      }
      .top-banner { background-size: 200% 200%; }

      /* Skeleton loading placeholder */
      .skeleton {
        background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 37%, #e2e8f0 63%);
        background-size: 400% 100%;
        animation: shimmer 1.4s ease infinite;
        border-radius: 8px;
      }
      @keyframes shimmer {
        0% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      /* Floating label on search focus */
      .search-bar input::placeholder {
        color: #94a3b8;
        transition: color .2s;
      }
      .search-bar input:focus::placeholder { color: #818cf8; }

      /* Active nav glow */
      .nav-btn:hover .icon { text-shadow: 0 0 10px rgba(99,102,241,.5); }

      /* Card stagger animation on load */
      .grid .card { animation: cardFadeIn .5s ease both; }
      .grid .card:nth-child(1) { animation-delay: .05s; }
      .grid .card:nth-child(2) { animation-delay: .1s; }
      .grid .card:nth-child(3) { animation-delay: .15s; }
      .grid .card:nth-child(4) { animation-delay: .2s; }
      .grid .card:nth-child(5) { animation-delay: .25s; }
      .grid .card:nth-child(6) { animation-delay: .3s; }
      .grid .card:nth-child(7) { animation-delay: .35s; }
      .grid .card:nth-child(8) { animation-delay: .4s; }
      @keyframes cardFadeIn {
        from { opacity: 0; transform: translateY(16px) scale(.97); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }

      /* Vibrant focus ring for all interactive elements */
      :focus-visible {
        outline: 2px solid #6366f1;
        outline-offset: 2px;
      }

      /* Price shimmer on hover */
      .card:hover .card-price {
        background: linear-gradient(135deg, #f43f5e 0%, #f59e0b 50%, #6366f1 100%);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: priceShimmer 1.5s linear infinite;
      }
      @keyframes priceShimmer {
        to { background-position: 200% center; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
      const { useState, useEffect, useCallback } = React;

      const CATEGORIES = ['All', 'Electronics', 'Fashion', 'Gaming', 'Collectibles', 'Toys'];
      const SORTS = [
        { value: 'newest', label: 'Newest first' },
        { value: 'ending', label: 'Ending soonest' },
        { value: 'price-asc', label: 'Price: Low to High' },
        { value: 'price-desc', label: 'Price: High to Low' },
      ];

      /* ── API helper ── */
      async function api(url, options = {}) {
        const res = await fetch(url, { headers: { 'Content-Type': 'application/json' }, ...options });
        const ct = res.headers.get('content-type') || '';
        if (!ct.includes('application/json')) throw new Error('Server returned non-JSON response');
        const json = await res.json();
        if (!res.ok) throw new Error(json.error || 'Request failed');
        return json;
      }

      /* ── Toast ── */
      function Toast({ message }) {
        if (!message) return null;
        return <div className="toast">{message}</div>;
      }

      /* ── Listing Card ── */
      function ListingCard({ item, onView, onBid, onBuy }) {
        return (
          <article className="card" onClick={() => onView(item)}>
            <img className="card-img" src={item.image} alt={item.title} />
            <div className="card-body">
              <div className="card-title">{item.title}</div>
              <div className="card-price">${item.currentBid.toLocaleString()}</div>
              <div className="card-buynow">Buy It Now: ${item.buyNowPrice.toLocaleString()}</div>
              <div className="card-meta">{item.bids} bids · {item.timeLeft} left</div>
              <div className="card-shipping">{item.shipping}</div>
              <div className="card-watchers">👁 {item.watchers} watching</div>
              {item.sold ? (
                <div className="card-sold">SOLD</div>
              ) : (
                <div className="card-actions" onClick={(e) => e.stopPropagation()}>
                  <button className="btn btn-bid" onClick={() => onBid(item)}>Place Bid</button>
                  <button className="btn btn-buy" onClick={() => onBuy(item)}>Buy Now</button>
                </div>
              )}
            </div>
          </article>
        );
      }

      /* ── Detail Page ── */
      function DetailView({ item, onBack, onBid, onBuy, onWatch }) {
        if (!item) return null;
        return (
          <div className="page">
            <button className="back-btn" onClick={onBack}>← Back to listings</button>
            <div className="detail">
              <img className="detail-img" src={item.image} alt={item.title} />
              <div className="detail-info">
                <div className="detail-title">{item.title}</div>
                <div className="detail-price">${item.currentBid.toLocaleString()}</div>
                <p style={{ fontSize: '.92rem', color: '#475569', lineHeight: 1.7, background: 'linear-gradient(135deg, #f8fafc, #ede9fe)', padding: '12px 14px', borderRadius: '10px', borderLeft: '3px solid #8b5cf6' }}>{item.description}</p>
                <div className="detail-row"><span className="detail-label">Condition</span><span className="detail-value">{item.condition}</span></div>
                <div className="detail-row"><span className="detail-label">Category</span><span className="detail-value">{item.category}</span></div>
                <div className="detail-row"><span className="detail-label">Location</span><span className="detail-value">{item.location}</span></div>
                <div className="detail-row"><span className="detail-label">Shipping</span><span className="detail-value">{item.shipping}</span></div>
                <div className="detail-row"><span className="detail-label">Time Left</span><span className="detail-value" style={{ color: '#f43f5e', fontWeight: 700, textShadow: '0 0 8px rgba(244,63,94,.25)' }}>{item.timeLeft}</span></div>
                <div className="detail-row"><span className="detail-label">Bids</span><span className="detail-value">{item.bids}</span></div>
                <div className="detail-row"><span className="detail-label">Buy Now</span><span className="detail-value">${item.buyNowPrice.toLocaleString()}</span></div>
                <div className="detail-seller">
                  <strong>Seller:</strong> {item.seller} · 📍 {item.location}
                </div>
                {item.sold ? (
                  <div className="card-sold" style={{ padding: 12, textAlign: 'center', fontSize: '1rem', background: 'linear-gradient(135deg, #fef2f2, #ffe4e6)', color: '#e11d48', borderRadius: '10px', border: '1px solid #fecdd3', fontWeight: 700 }}>This item has been sold</div>
                ) : (
                  <div className="detail-actions">
                    <button className="btn btn-bid" onClick={() => onBid(item)}>Place Bid</button>
                    <button className="btn btn-buy" onClick={() => onBuy(item)}>Buy Now — ${item.buyNowPrice}</button>
                    <button className="btn btn-outline" onClick={() => onWatch(item)}>♡ Watch</button>
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      }

      /* ── Panel (Cart / Watchlist) ── */
      function Panel({ title, items, onRemove, onClose, showTotal }) {
        const total = items.reduce((s, i) => s + i.buyNowPrice, 0);
        return (
          <div className="page">
            <button className="back-btn" onClick={onClose}>← Back</button>
            <div className="panel">
              <div className="panel-title">{title} ({items.length})</div>
              {items.length === 0 ? (
                <div className="panel-empty">Nothing here yet.</div>
              ) : (
                <>
                  {items.map((item) => (
                    <div className="panel-item" key={item.id}>
                      <img src={item.image} alt={item.title} />
                      <div className="panel-item-info">
                        <div className="panel-item-title">{item.title}</div>
                        <div className="panel-item-price">${item.buyNowPrice.toLocaleString()}</div>
                      </div>
                      <button className="panel-remove" onClick={() => onRemove(item.id)}>✕ Remove</button>
                    </div>
                  ))}
                  {showTotal && <div className="panel-total"><span>Total</span><span>${total.toLocaleString()}</span></div>}
                  {showTotal && items.length > 0 && (
                    <button className="btn btn-primary" style={{ width: '100%', marginTop: 12, padding: 16, fontSize: '1.05rem', background: 'linear-gradient(135deg, #6366f1, #8b5cf6, #a855f7)', border: 'none', borderRadius: '12px', color: '#fff', fontWeight: 700, letterSpacing: '.02em', boxShadow: '0 4px 14px rgba(99,102,241,.4)', cursor: 'pointer' }}>
                      🛒 Proceed to Checkout
                    </button>
                  )}
                </>
              )}
            </div>
          </div>
        );
      }

      /* ── App ── */
      function App() {
        const [page, setPage] = useState('home');
        const [listings, setListings] = useState([]);
        const [loading, setLoading] = useState(true);
        const [query, setQuery] = useState('');
        const [category, setCategory] = useState('All');
        const [sort, setSort] = useState('newest');
        const [selectedItem, setSelectedItem] = useState(null);
        const [cart, setCart] = useState([]);
        const [watchlist, setWatchlist] = useState([]);
        const [toast, setToast] = useState('');

        function showToast(msg) {
          setToast(msg);
          setTimeout(() => setToast(''), 2500);
        }

        const loadListings = useCallback(async (q = query, cat = category, s = sort) => {
          setLoading(true);
          try {
            const params = new URLSearchParams();
            if (q.trim()) params.set('q', q.trim());
            if (cat !== 'All') params.set('category', cat);
            params.set('sort', s);
            const result = await api(`/api/listings?${params}`);
            setListings(result.data.listings);
          } catch (err) {
            showToast(err.message);
          } finally {
            setLoading(false);
          }
        }, [query, category, sort]);

        useEffect(() => { loadListings(); }, []);

        function handleSearch() { loadListings(query, category, sort); }
        function handleCategoryClick(cat) { setCategory(cat); loadListings(query, cat, sort); }
        function handleSortChange(e) { const s = e.target.value; setSort(s); loadListings(query, category, s); }

        function viewItem(item) { setSelectedItem(item); setPage('detail'); window.scrollTo(0, 0); }

        async function placeBid(item) {
          const entered = window.prompt(`Enter bid (current: $${item.currentBid})`, String(item.currentBid + 10));
          if (!entered) return;
          try {
            await api(`/api/listings/${item.id}/bid`, { method: 'POST', body: JSON.stringify({ amount: Number(entered) }) });
            showToast(`Bid of $${entered} placed!`);
            loadListings();
            if (page === 'detail') {
              const res = await api(`/api/listings/${item.id}`);
              setSelectedItem(res.data);
            }
          } catch (err) { showToast(err.message); }
        }

        async function buyNow(item) {
          if (!window.confirm(`Buy "${item.title}" for $${item.buyNowPrice}?`)) return;
          try {
            await api(`/api/listings/${item.id}/buy`, { method: 'POST' });
            setCart((prev) => [...prev, item]);
            showToast(`Purchased ${item.title}!`);
            loadListings();
            if (page === 'detail') {
              const res = await api(`/api/listings/${item.id}`);
              setSelectedItem(res.data);
            }
          } catch (err) { showToast(err.message); }
        }

        async function addToWatchlist(item) {
          if (watchlist.find((w) => w.id === item.id)) { showToast('Already in watchlist'); return; }
          try {
            await api(`/api/listings/${item.id}/watch`, { method: 'POST' });
            setWatchlist((prev) => [...prev, item]);
            showToast(`${item.title} added to watchlist`);
          } catch (err) { showToast(err.message); }
        }

        return (
          <>
            {/* Top banner */}
            {/* ═══ INLINE CSS via style={{}} ═══ */}
            <div className="top-banner" style={{ background: 'linear-gradient(135deg, #6366f1 0%, #8b5cf6 30%, #a855f7 60%, #6366f1 100%)', color: '#fff', fontWeight: 600, letterSpacing: '.02em' }}>✨ Free shipping on orders over $50 · Buyer protection on every purchase ✨</div>

            {/* Header */}
            <header className="header">
              <div className="header-inner">
                <div className="logo" style={{ background: 'linear-gradient(135deg, #6366f1, #a855f7, #ec4899)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text', fontSize: '1.7rem', fontWeight: 900, letterSpacing: '-.02em' }} onClick={() => { setPage('home'); setSelectedItem(null); }}>IndexXZ</div>
                <div className="search-bar">
                  <select value={category} onChange={(e) => setCategory(e.target.value)}>
                    {CATEGORIES.map((c) => <option key={c} value={c}>{c}</option>)}
                  </select>
                  <input
                    value={query}
                    onChange={(e) => setQuery(e.target.value)}
                    onKeyDown={(e) => e.key === 'Enter' && handleSearch()}
                    placeholder="Search for anything"
                  />
                  <button onClick={handleSearch}>Search</button>
                </div>
                <div className="nav-icons">
                  <button className="nav-btn" onClick={() => setPage('watchlist')}>
                    <span className="icon">♡</span>
                    <span>Watchlist</span>
                    {watchlist.length > 0 && <span className="badge">{watchlist.length}</span>}
                  </button>
                  <button className="nav-btn" onClick={() => setPage('cart')}>
                    <span className="icon">🛒</span>
                    <span>Cart</span>
                    {cart.length > 0 && <span className="badge">{cart.length}</span>}
                  </button>
                </div>
              </div>
            </header>

            {/* Category bar – only on home */}
            {page === 'home' && (
              <nav className="cat-bar">
                <div className="cat-bar-inner">
                  {CATEGORIES.map((c) => (
                    <button key={c} className={`cat-btn ${c === category ? 'active' : ''}`} onClick={() => handleCategoryClick(c)}>{c}</button>
                  ))}
                </div>
              </nav>
            )}

            {/* Pages */}
            {page === 'home' && (
              <div className="page">
                <div className="toolbar">
                  <div className="toolbar-left"><strong>{listings.length}</strong> results {category !== 'All' ? `in ${category}` : ''}{query ? ` for "${query}"` : ''}</div>
                  <select className="sort-select" value={sort} onChange={handleSortChange}>
                    {SORTS.map((s) => <option key={s.value} value={s.value}>{s.label}</option>)}
                  </select>
                </div>
                {loading ? (
                  <div style={{ textAlign: 'center', padding: 50, color: '#6366f1', fontSize: '1.1rem', fontWeight: 600 }}>
                    <div style={{ fontSize: '2rem', marginBottom: 10, animation: 'spin 1s linear infinite' }}>⟳</div>
                    Loading listings...
                  </div>
                ) : listings.length === 0 ? (
                  <div style={{ textAlign: 'center', padding: 50, color: '#64748b', background: 'linear-gradient(135deg, #f8fafc, #ede9fe)', borderRadius: '16px', border: '1px dashed #c4b5fd' }}>
                    <div style={{ fontSize: '2.5rem', marginBottom: 8 }}>🔍</div>
                    <div style={{ fontWeight: 600, color: '#6366f1', marginBottom: 4 }}>No items found</div>
                    Try a different search or browse categories.
                  </div>
                ) : (
                  <section className="grid">
                    {listings.map((item) => (
                      <ListingCard key={item.id} item={item} onView={viewItem} onBid={placeBid} onBuy={buyNow} />
                    ))}
                  </section>
                )}
              </div>
            )}

            {page === 'detail' && (
              <DetailView
                item={selectedItem}
                onBack={() => { setPage('home'); setSelectedItem(null); }}
                onBid={placeBid}
                onBuy={buyNow}
                onWatch={addToWatchlist}
              />
            )}

            {page === 'watchlist' && (
              <Panel
                title="My Watchlist"
                items={watchlist}
                onRemove={(id) => setWatchlist((prev) => prev.filter((i) => i.id !== id))}
                onClose={() => setPage('home')}
                showTotal={false}
              />
            )}

            {page === 'cart' && (
              <Panel
                title="Shopping Cart"
                items={cart}
                onRemove={(id) => setCart((prev) => prev.filter((i) => i.id !== id))}
                onClose={() => setPage('home')}
                showTotal={true}
              />
            )}

            {/* Footer */}
            <footer className="footer">
              <div className="footer-inner">
                <div>
                  <h4>Buy</h4>
                  <p><a href="#">Registration</a></p>
                  <p><a href="#">Bidding & buying help</a></p>
                  <p><a href="#">Stores</a></p>
                </div>
                <div>
                  <h4>Sell</h4>
                  <p><a href="#">Start selling</a></p>
                  <p><a href="#">Seller center</a></p>
                  <p><a href="#">Fees & invoices</a></p>
                </div>
                <div>
                  <h4>Help</h4>
                  <p><a href="#">Customer service</a></p>
                  <p><a href="#">Returns</a></p>
                  <p><a href="#">Contact us</a></p>
                </div>
                <div>
                  <h4>About</h4>
                  <p><a href="#">Company info</a></p>
                  <p><a href="#">Careers</a></p>
                  <p><a href="#">Policies</a></p>
                </div>
              </div>
              <div className="footer-bottom">© 2026 IndexXZ Inc. All Rights Reserved.</div>
            </footer>

            <Toast message={toast} />
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
